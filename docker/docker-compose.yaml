services:
  document-ms:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3002:3002"
    env_file:
      - ../.env
    environment:
      # Override database URL to use host.docker.internal for Docker
      - DATABASE_URL=jdbc:postgresql://host.docker.internal:5432/corems
      # Override S3 endpoint to use host.docker.internal for Docker
      - S3_ENDPOINT=http://host.docker.internal:9000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - corems-network

networks:
  corems-network:
    external: true
